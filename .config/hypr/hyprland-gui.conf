# Generated by HyprMod

decoration:active_opacity = 0.9
decoration:blur:passes = 5
decoration:blur:size = 3
decoration:blur:xray = 1
decoration:inactive_opacity = 0.8
decoration:rounding = 12
general:border_size = 2
general:col.active_border = 0xffffffff 50deg
general:gaps_in = 6
general:gaps_out = 18
general:layout = scrolling
general:snap:enabled = 1
input:accel_profile = 
input:mouse_refocus = 0
input:touchpad:natural_scroll = 1
misc:vfr = 1
misc:vrr = 1

# Animations
animation = global, 1, 4.0, default
animation = workspaces, 1, 4.0, default, slidevert

# Monitors
monitor = eDP-1, 2560x1600@165.00Hz, 0x0, 1, cm, srgb

# Keybinds
