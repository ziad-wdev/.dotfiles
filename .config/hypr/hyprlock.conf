source = hyprland-colors.conf

general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = true
}

background {
    monitor =
    path = $image
    blur_passes = 2
    contrast = 0.8
    brightness = 0.5
}

input-field {
    monitor =
    inner_color = $on_surface
    font_color = $surface
    outer_color = $primary
    check_color = $secondary
    fail_color = $error
    size = 200, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    fade_on_empty = true
    placeholder_text = <i>Password</i>
    hide_input = false
    position = 0, -30
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = $primary
    font_size = 96
    font_family = JetBrainsMono Nerd Font
    position = 0, 100
    halign = center
    valign = center
}
