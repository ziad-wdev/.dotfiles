###################
### MY PROGRAMS ###
###################

$screenshot = pkill slurp || hyprshot -z -m region -o ~/Pictures/screenshots
$windowScreenshot = pkill slurp || hyprshot -z -m window -o ~/Pictures/screenshots
$colorPicker = pkill hyprpicker || hyprpicker

$powerMenu = pkill wlogout || wlogout -b 5
$appLauncher = pkill rofi || rofi -show drun
$wallpaperPicker = pkill rofi || ~/.config/rofi/scripts/rofi-wallpapers.sh

$fileManager = nautilus
$terminal = ghostty
$browser = firefox

#################
### AUTOSTART ###
#################

exec-once = systemctl --user start hyprpolkitagent

exec-once = waybar & awww-daemon

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

#############
### BINDS ###
#############

bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

input {
    kb_layout = us,ara
    kb_variant =
    kb_model =
    kb_options = grp:win_space_toggle
    kb_rules =
}

##############
### COLORS ###
##############

source = colors.conf

general {
  col.active_border   = $primary
  col.inactive_border = $background
}

layerrule = blur on, xray on, match:namespace logout_dialog

###############
### HyprMod ###
###############

source = /home/ziad/.config/hypr/hyprland-gui.conf
