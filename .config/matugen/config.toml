[config]

[templates.gtk3]
input_path = '~/.config/matugen/templates/gtk.css'
output_path = '~/.config/gtk-3.0/colors.css'
post_hook = 'gsettings set org.gnome.desktop.interface gtk-theme ""; gsettings set org.gnome.desktop.interface gtk-theme adw-gtk3-dark'

[templates.gtk4]
input_path = '~/.config/matugen/templates/gtk.css'
output_path = '~/.config/gtk-4.0/colors.css'

[templates.hyprland]
input_path = '~/.config/matugen/templates/hyprland.conf'
output_path = '~/.config/hypr/colors.conf'
post_hook = 'hyprctl reload &> /dev/null'

[templates.wlogout]
input_path = '~/.config/matugen/templates/colors.css'
output_path = '~/.config/wlogout/colors.css'

[templates.waybar]
input_path = '~/.config/matugen/templates/colors.css'
output_path = '~/.config/waybar/colors.css'

[templates.rofi]
input_path = '~/.config/matugen/templates/rofi.rasi'
output_path = '~/.config/rofi/colors.rasi'

[templates.ghostty]
input_path = '~/.config/matugen/templates/ghostty'
output_path = '~/.config/ghostty/themes/custom'
post_hook = 'pkill -SIGUSR2 ghostty'

[templates.zed]
input_path = '~/.config/matugen/templates/zed.json'
output_path = '~/.config/zed/themes/custom.json'

[templates.spicetify]
input_path = '~/.config/matugen/templates/spicetify.ini'
output_path = '~/.config/spicetify/Themes/custom/color.ini'
post_hook = 'spicetify apply --no-restart'

[templates.vesktop]
input_path = '~/.config/matugen/templates/discord.css'
output_path = '~/.config/matugen/apps/vesktop/themes/custom.css'

[templates.firefox]
input_path = "~/.config/matugen/templates/firefox.css"
output_path = "~/.config/matugen/apps/firefox/colors.css"

[templates.steam]
input_path = '~/.config/matugen/templates/steam.css'
output_path = '~/.config/matugen/apps/AdwSteamGtk/custom.css'

[templates.obs]
input_path = '~/.config/matugen/templates/obs.obt'
output_path = '~/.config/matugen/apps/obs/themes/custom.obt'
